{{- if .Values.paperclip.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "paperclip.serviceAccountName" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  {{- with .Values.paperclip.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
